version: "3.9"

networks:
  bazario-net:

volumes:
  elasticsearch_data:

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: prod
  CONFIG_SERVER_URL: http://config-server:8888
  EUREKA_URL: http://service-registry:8761/eureka

services:

  service-registry:
    image: iamahesan/service-registry:v2
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - bazario-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      retries: 10
    restart: unless-stopped

  config-server:
    image: iamahesan/config-server:v2
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      retries: 10
    restart: unless-stopped

  api-gateway:
    image: iamahesan/api-gateway:v2
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      retries: 10
    restart: unless-stopped

  auth-service:
    image: iamahesan/auth-service:v2
    container_name: auth-service
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped

  user-service:
    image: iamahesan/user-service:v2
    container_name: user-service
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped

  inventory-service:
    image: iamahesan/inventory-service:v2
    container_name: inventory-service
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped

  order-service:
    image: iamahesan/order-service:v2
    container_name: order-service
    networks:
      - bazario-net
    environment:
      <<: *common-env
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - bazario-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200" ]
      interval: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bazario-net
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bazario-net
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - bazario-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9411/health" ]
      interval: 10s
      retries: 5
    restart: unless-stopped