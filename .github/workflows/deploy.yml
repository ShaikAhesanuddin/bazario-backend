name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  VERSION: v6.0.1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JARs
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Setup Docker Buildx
        run: |
          docker buildx inspect builder >/dev/null 2>&1 || docker buildx create --name builder --use
          docker buildx use builder

      - name: Build and push Docker images
        run: |
          for service in api-gateway auth-service user-service inventory-service order-service config-server service-registry logstash
          do
            echo "Building $service with version $VERSION"

            docker buildx build \
              --platform linux/amd64 \
              -t ${{ secrets.DOCKER_USERNAME }}/$service:$VERSION \
              -t ${{ secrets.DOCKER_USERNAME }}/$service:latest \
              --push ./$service
          done

  deploy-ec2-1:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2-1 via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/bazario-key.pem ubuntu@${{ secrets.PRIVATE_EC2_IP_1 }} << EOF

            set -e
            echo "Deploying on EC2-1"

            if [ ! -d "bazario" ]; then
              git clone https://github.com/ShaikAhesanuddin/bazario-backend.git bazario
            fi

            cd bazario
            git fetch origin
            git reset --hard origin/main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose up -d --pull always --force-recreate --remove-orphans

            docker ps

            EOF

  deploy-ec2-2:
    needs: deploy-ec2-1
    runs-on: ubuntu-latest

    steps:
      - name: Wait for EC2-1 stability
        run: sleep 20

      - name: Deploy to EC2-2 via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/bazario-key.pem ubuntu@${{ secrets.PRIVATE_EC2_IP_2 }} << EOF

            set -e
            echo "Deploying on EC2-2"

            if [ ! -d "bazario" ]; then
              git clone https://github.com/ShaikAhesanuddin/bazario-backend.git bazario
            fi

            cd bazario
            git fetch origin
            git reset --hard origin/main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose up -d --pull always --force-recreate --remove-orphans

            docker ps

            EOF