name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JARs
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker images
        run: |
          docker buildx create --name builder --use || docker buildx use builder
          VERSION=v6.0.1

          for service in api-gateway auth-service user-service inventory-service order-service config-server service-registry logstash
          do
            echo "Building $service..."

            docker buildx build \
              --platform linux/amd64 \
              -t ${{ secrets.DOCKER_USERNAME }}/$service:$VERSION \
              -t ${{ secrets.DOCKER_USERNAME }}/$service:latest \
              --push ./$service
          done

  deploy-ec2-1:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2-1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/bazario-key.pem ubuntu@${{ secrets.PRIVATE_EC2_IP_1 }} << EOF

            set -e
            if [ ! -d "bazario" ]; then
              git clone https://github.com/ShaikAhesanuddin/bazario-backend.git bazario
            fi
            cd bazario
            git pull origin main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker-compose pull
            docker-compose up -d --force-recreate --remove-orphans

            EOF

  deploy-ec2-2:
    needs: [ build-and-push, deploy-ec2-1 ]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2-2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/bazario-key.pem ubuntu@${{ secrets.PRIVATE_EC2_IP_2 }} << EOF
            
            set -e
            
            if [ ! -d "bazario" ]; then
              git clone https://github.com/ShaikAhesanuddin/bazario-backend.git bazario
            fi
            cd bazario
            git pull origin main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker-compose pull
            docker-compose up -d --force-recreate --remove-orphans

            EOF