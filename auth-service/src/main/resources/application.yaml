spring:
  application:
    name: AUTH-SERVICE

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}, aws-secretsmanager:bazario/auth-service"

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 20
        initial-interval: 3000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}